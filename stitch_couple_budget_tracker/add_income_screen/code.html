<div class="relative flex min-h-screen w-full flex-col bg-[#fff8f5] overflow-x-hidden max-w-md mx-auto">

<div class="flex items-center bg-transparent p-4 pb-2 justify-between">

<h1 class="text-primary tracking-tight text-[48px] font-bold leading-tight">$0.00</h1>

</label>
<label class="flex cursor-pointer h-full grow items-center justify-center overflow-hidden rounded-lg px-2 has-[:checked]:bg-surface-container-lowest has-[:checked]:shadow-[0_2px_8px_rgba(0,0,0,0.05)] has-[:checked]:text-primary text-on-surface-variant text-sm font-semibold transition-all">
<span class="truncate">Income</span>
<input checked="" class="invisible w-0" name="transaction-type" type="radio" value="Income"/>
</label>
</div>
</div>
<!-- Income Categories (Shared Grid Structure) -->
<h3 class="text-on-surface text-lg font-bold leading-tight tracking-[-0.015em] px-4 pb-2 pt-4 font-headline">Income Category</h3>
<div class="grid grid-cols-2 gap-3 p-4">

</div>

<div class="px-4 py-2 space-y-4">
<div class="flex flex-col gap-1.5">
<label class="text-on-surface text-sm font-bold px-1 font-headline">Transaction Date</label>
<div class="flex items-center gap-3 rounded-xl border border-outline-variant bg-surface-container-lowest p-3.5">

<input class="bg-transparent border-none p-0 focus:ring-0 text-on-surface w-full font-medium" type="text" value="Today, Oct 24, 2023"/>
</div>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-on-surface text-sm font-bold px-1 font-headline">Add Details/Notes</label>
<div class="flex items-start gap-3 rounded-xl border border-outline-variant bg-surface-container-lowest p-3.5">
<span class="material-symbols-outlined text-outline mt-0.5">notes</span>
<textarea class="bg-transparent border-none p-0 focus:ring-0 text-on-surface w-full resize-none font-medium" placeholder="What was this for?" rows="2"></textarea>
</div>
</div>
</div>
<!-- Action Button -->
<div class="mt-auto p-4 pt-6">
<button class="w-full bg-primary text-on-primary py-4 rounded-xl font-bold text-lg shadow-lg shadow-primary/20 active:scale-[0.98] transition-transform">

            </button>

<div class="h-8"></div>
