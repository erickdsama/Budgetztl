<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add Income - Harmonize UI</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed": "#ffdbcf",
                        "on-surface-variant": "#3e4949",
                        "on-primary-fixed": "#002020",
                        "tertiary": "#a13a0f",
                        "tertiary-fixed-dim": "#ffb59c",
                        "surface-container-highest": "#eae1da",
                        "on-tertiary-fixed-variant": "#822800",
                        "secondary-fixed-dim": "#bfc8c8",
                        "outline-variant": "#bdc9c8",
                        "outline": "#6e7979",
                        "surface-tint": "#00696b",
                        "surface-container": "#f6ece6",
                        "on-error-container": "#93000a",
                        "on-tertiary-container": "#fffbff",
                        "primary-fixed": "#95f2f4",
                        "inverse-on-surface": "#f9efe8",
                        "on-background": "#1f1b17",
                        "surface": "#fff8f5",
                        "tertiary-container": "#c25227",
                        "secondary-container": "#dbe4e4",
                        "on-tertiary-fixed": "#380c00",
                        "background": "#fff8f5",
                        "inverse-surface": "#342f2b",
                        "on-primary-fixed-variant": "#004f51",
                        "on-tertiary": "#ffffff",
                        "on-secondary-container": "#5d6666",
                        "on-secondary-fixed": "#151d1d",
                        "error": "#ba1a1a",
                        "on-surface": "#1f1b17",
                        "primary-container": "#118184",
                        "inverse-primary": "#79d5d7",
                        "secondary-fixed": "#dbe4e4",
                        "primary": "#006769",
                        "surface-container-lowest": "#ffffff",
                        "on-error": "#ffffff",
                        "on-secondary": "#ffffff",
                        "on-primary-container": "#f3ffff",
                        "surface-variant": "#eae1da",
                        "on-primary": "#ffffff",
                        "surface-dim": "#e2d8d2",
                        "secondary": "#576060",
                        "surface-container-high": "#f0e6e0",
                        "surface-container-low": "#fcf2eb",
                        "surface-bright": "#fff8f5",
                        "on-secondary-fixed-variant": "#404848",
                        "error-container": "#ffdad6",
                        "primary-fixed-dim": "#79d5d7",
                        "vibrant-teal": "#14B8A6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { background-color: #fff8f5; font-family: 'Inter', sans-serif; }
        h1, h2, h3, .font-headline { font-family: 'Manrope', sans-serif; }
    </style>
</head>
<body class="font-body text-on-surface antialiased min-h-screen">
<!-- TopAppBar -->
<header class="w-full top-0 sticky z-40 bg-[#fff8f5]/90 backdrop-blur-md flex justify-between items-center px-6 py-4">
<div class="flex items-center gap-4">
<button class="hover:bg-primary/5 p-2 rounded-full transition-colors text-primary">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<h1 class="font-headline tracking-tight text-xl font-extrabold text-primary">Add Income</h1>
</div>
<div class="w-10 h-10 rounded-full overflow-hidden bg-surface-container-highest border-2 border-primary/20">
<img alt="User profile" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBqtaj6RwM4156sy1paiG31DalibznN5ubQ0L3_Nx2wMM0DJIwlqRpLi2eMoQWiHidkqNcgK-xfwNX5SE4V3n9NvjEIzri6fBi2NYtdKDRpgdhgVbIhBv95A1bNhZEu-6jxTYwc9QKqbmhsK7cr3_Exg5R0gR404SIa28JAQ-WCMPQ759ywxULo3RHvUFtSn_zR0xz3ApIIugjIGCMYPxL4kMcoetVfqprb5nB20z9gVhz_yJbF-xOvXMocsZBNnbSlBBpvwu8iVvY"/>
</div>
</header>
<main class="max-w-xl mx-auto px-6 pb-40">
<!-- Integrated Toggle Switch -->
<div class="mt-8 flex justify-center">
<div class="bg-surface-container-high/50 backdrop-blur-sm p-1.5 rounded-full flex gap-1 items-center border border-white/50 shadow-sm">
<button class="px-8 py-2 rounded-full font-label text-xs font-bold uppercase tracking-widest transition-all duration-300 text-secondary hover:text-primary">
                    Expense
                </button>
<button class="px-8 py-2 rounded-full font-label text-xs font-bold uppercase tracking-widest transition-all duration-300 bg-primary text-on-primary shadow-md">
                    Income
                </button>
</div>
</div>
<!-- Transaction Amount Display -->
<section class="mt-12 text-center">
<span class="font-label text-[10px] font-bold uppercase tracking-[0.2em] text-secondary/60 mb-2 block">Amount to Add</span>
<div class="relative inline-flex items-center justify-center gap-2">
<span class="text-3xl font-headline font-extrabold text-primary opacity-60">$</span>
<input class="bg-transparent border-none focus:ring-0 text-7xl md:text-8xl font-headline font-black text-primary tracking-tighter w-full max-w-[320px] text-center placeholder-primary/10" placeholder="0.00" type="text" value="4,250"/>
</div>
<div class="mt-4 flex justify-center">
<div class="h-1.5 w-12 rounded-full bg-primary/10"></div>
</div>
</section>
<!-- Income Categories Grid (Bento Style) -->
<section class="mt-16">
<div class="flex justify-between items-end mb-6 px-1">
<div>
<span class="font-label text-[10px] font-bold uppercase tracking-widest text-secondary opacity-60">Classification</span>
<h2 class="font-headline text-2xl font-bold tracking-tight text-on-surface">Source of Wealth</h2>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<!-- Salary - Active/Selected Style -->
<div class="group cursor-pointer bg-primary rounded-3xl p-6 flex flex-col justify-between aspect-square transition-all duration-300 shadow-lg shadow-primary/20 hover:scale-[1.02]">
<div class="bg-white/20 w-12 h-12 rounded-2xl flex items-center justify-center backdrop-blur-md">
<span class="material-symbols-outlined text-white" data-icon="payments" style="font-variation-settings: 'FILL' 1;">payments</span>
</div>
<div>
<span class="font-headline font-extrabold text-white text-xl block">Salary</span>
<span class="text-white/60 text-[10px] font-bold uppercase tracking-wider">Primary</span>
</div>
</div>
<!-- Bonus -->
<div class="group cursor-pointer bg-white rounded-3xl p-6 flex flex-col justify-between aspect-square transition-all duration-300 border border-primary/5 hover:border-primary/20 hover:bg-surface-container-low">
<div class="bg-primary/10 w-12 h-12 rounded-2xl flex items-center justify-center text-primary transition-colors group-hover:bg-primary group-hover:text-white">
<span class="material-symbols-outlined" data-icon="military_tech">military_tech</span>
</div>
<span class="font-headline font-bold text-on-surface text-xl">Bonus</span>
</div>
<!-- Dividends -->
<div class="group cursor-pointer bg-white rounded-3xl p-6 flex flex-col justify-between aspect-square transition-all duration-300 border border-primary/5 hover:border-primary/20 hover:bg-surface-container-low">
<div class="bg-primary/10 w-12 h-12 rounded-2xl flex items-center justify-center text-primary transition-colors group-hover:bg-primary group-hover:text-white">
<span class="material-symbols-outlined" data-icon="show_chart">show_chart</span>
</div>
<span class="font-headline font-bold text-on-surface text-xl">Dividends</span>
</div>
<!-- Gift -->
<div class="group cursor-pointer bg-white rounded-3xl p-6 flex flex-col justify-between aspect-square transition-all duration-300 border border-primary/5 hover:border-primary/20 hover:bg-surface-container-low">
<div class="bg-primary/10 w-12 h-12 rounded-2xl flex items-center justify-center text-primary transition-colors group-hover:bg-primary group-hover:text-white">
<span class="material-symbols-outlined" data-icon="card_giftcard">card_giftcard</span>
</div>
<span class="font-headline font-bold text-on-surface text-xl">Gift</span>
</div>
</div>
</section>
<!-- Transaction Details -->
<section class="mt-12 space-y-6">
<div class="flex flex-col gap-2">
<label class="font-label text-[10px] font-bold uppercase tracking-widest text-secondary opacity-60 px-1">Transaction Date</label>
<div class="bg-white rounded-2xl px-6 py-5 flex items-center justify-between group cursor-pointer border border-primary/5 hover:border-primary/20 transition-all shadow-sm">
<div class="flex items-center gap-4">
<div class="p-2 bg-primary/5 rounded-lg text-primary">
<span class="material-symbols-outlined" data-icon="calendar_today">calendar_today</span>
</div>
<span class="font-body font-semibold text-on-surface">Today, Oct 24, 2023</span>
</div>
<span class="material-symbols-outlined text-outline-variant" data-icon="chevron_right">chevron_right</span>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="font-label text-[10px] font-bold uppercase tracking-widest text-secondary opacity-60 px-1">Add Details/Notes</label>
<div class="bg-white rounded-2xl p-1 border border-primary/5 focus-within:border-primary/40 focus-within:shadow-md transition-all shadow-sm">
<textarea class="w-full bg-transparent border-none focus:ring-0 px-5 py-4 font-body text-on-surface placeholder:text-outline-variant/60 text-sm leading-relaxed" placeholder="What was this for? (e.g. Q3 performance bonus)" rows="3"></textarea>
</div>
</div>
</section>
<!-- Aesthetic Buffer / Decorative Touch -->
<div class="mt-12 rounded-3xl overflow-hidden aspect-[16/5] relative border border-white/50 grayscale opacity-40 hover:opacity-100 transition-opacity duration-700">
<img alt="Decorative background" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAZMRmnP3hm-se5CUnVEblUlzvOjnHVyvNvvMHAvrYRZRS6rrozayFqaswWbBQm722VzPuBMfD8wA9WMBnD6IIzlkDJdLKjZDE6EcqrI6Mhjk_xG1LBYKZ44vGspJ0mLHmpKVodY_OVnMYMHylGK2XIT1m163nzLFEpHTxu9HLyf12UI0JDExaIiwrY7GpHYEqtaj74ZLfwqjbaaYnSsEcGW8m9Sn1H7ZX28oJEKCqHE6T5yxLzre0Z70Qbn-YRLmh0jtXqHsxqpa8"/>
<div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent"></div>
</div>
</main>
<!-- Bottom Action Button -->
<div class="fixed bottom-0 left-0 w-full px-6 pb-10 pt-8 bg-gradient-to-t from-background via-background/95 to-transparent z-50">
<div class="max-w-xl mx-auto">
<button class="w-full bg-primary hover:bg-primary-container text-on-primary font-headline font-extrabold text-lg py-5 rounded-full shadow-[0px_20px_40px_rgba(0,103,105,0.25)] transition-all duration-300 hover:scale-[1.02] active:scale-[0.98] flex items-center justify-center gap-3">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                Confirm Income
            </button>
</div>
</div>
</body></html>
